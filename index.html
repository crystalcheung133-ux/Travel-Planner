<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CCMV Journey Planner</title>
  <style>
    :root{
      --cream:#f7f0e6;--paper:#fffaf3;--ink:#2f2923;--muted:#7f7163;--gold:#b8965e;--gold-deep:#8e6f3f;--line:rgba(142,111,63,.22);--shadow:0 18px 50px rgba(77,55,30,.10);--radius:28px;
      --font: ui-serif, Georgia, 'Times New Roman', 'Noto Serif TC', serif;
      --sans: -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;
    }
    *{box-sizing:border-box} body{margin:0;background:var(--cream);color:var(--ink);font-family:var(--sans);line-height:1.55;}
    body:before{content:'CCMV';position:fixed;inset:0;display:grid;place-items:center;font-family:var(--font);font-size:20vw;letter-spacing:.08em;color:rgba(142,111,63,.16);z-index:-1;pointer-events:none}
    .wrap{max-width:1180px;margin:auto;padding:34px 22px 70px}.hero{background:rgba(255,250,243,.82);border:1px solid var(--line);border-radius:36px;padding:42px;box-shadow:var(--shadow);position:relative;overflow:hidden}.hero:after,.card:after,.activity:after{content:'CCMV';position:absolute;right:22px;bottom:14px;font-family:var(--font);font-size:34px;letter-spacing:.12em;color:rgba(142,111,63,.11);pointer-events:none}.brand{font-family:var(--font);letter-spacing:.18em;color:var(--gold-deep);font-size:15px}.hero h1{font-family:var(--font);font-size:54px;line-height:1;margin:12px 0}.subtitle{font-size:18px;color:var(--muted);max-width:720px}.nav{display:flex;gap:10px;flex-wrap:wrap;margin:26px 0}.nav button{border:1px solid var(--line);background:rgba(255,250,243,.78);border-radius:999px;padding:12px 18px;color:var(--ink);cursor:pointer;font-weight:600}.nav button.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}.section{display:none}.section.active{display:block}.day-head{display:flex;justify-content:space-between;gap:18px;align-items:end;margin:38px 0 20px}.day-kicker{font-family:var(--font);letter-spacing:.16em;color:var(--gold-deep);font-size:14px}.day-title{font-family:var(--font);font-size:44px;margin:4px 0}.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}.card{background:rgba(255,250,243,.88);border:1px solid var(--line);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);position:relative;overflow:hidden}.card h3{font-family:var(--font);font-size:24px;margin:0 0 14px}.glance{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.glance-item{background:rgba(184,150,94,.08);border:1px solid rgba(184,150,94,.18);border-radius:20px;padding:15px}.label{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-deep);font-weight:700}.value{font-size:17px;font-weight:650;margin-top:4px}.price{color:var(--gold-deep);font-size:13px;margin-left:4px}.timeline{display:grid;gap:12px}.time-row{display:grid;grid-template-columns:110px 1fr;gap:16px;padding:14px 0;border-bottom:1px solid rgba(142,111,63,.14)}.time{font-family:var(--font);color:var(--gold-deep)}.activity{background:rgba(255,250,243,.92);border:1px solid var(--line);border-radius:var(--radius);padding:24px;margin:16px 0;box-shadow:var(--shadow);position:relative;overflow:hidden}.activity h4{font-family:var(--font);font-size:25px;margin:0 0 6px}.why{background:rgba(184,150,94,.08);border-left:3px solid var(--gold);border-radius:16px;padding:14px 16px;margin:14px 0;color:#4a3d30}.react{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}.react button{border:1px solid var(--line);background:#fffdf8;border-radius:999px;padding:10px 14px;cursor:pointer;font-size:15px}.react button:hover{border-color:var(--gold)}textarea{width:100%;min-height:78px;border:1px solid var(--line);border-radius:18px;padding:14px;background:#fffdf8;font:inherit;color:var(--ink)}.table{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.person{border:1px solid var(--line);border-radius:22px;background:rgba(255,253,248,.74);padding:18px;min-height:110px}.person strong{display:block;margin-bottom:8px}.muted{color:var(--muted)}.two{display:grid;grid-template-columns:1.05fr .95fr;gap:18px}@media(max-width:820px){.wrap{padding:18px 14px 44px}.hero{padding:26px}.hero h1{font-size:38px}.day-head{display:block}.day-title{font-size:34px}.grid,.two,.table,.glance{grid-template-columns:1fr}.time-row{grid-template-columns:88px 1fr}.nav{position:sticky;top:0;background:rgba(247,240,230,.94);padding:10px 0;z-index:5;overflow:auto;flex-wrap:nowrap}.nav button{white-space:nowrap;padding:12px 15px}.react button{padding:12px 16px}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="brand">CCMV</div>
      <h1>Journey Planner</h1>
      <p class="subtitle">Before the Trip. 一份俾四位媽媽一齊 review、快速表態、再完成 final itinerary 的 planning book。</p>
      <div class="nav" id="nav"></div>
    </section>
    <main id="app"></main>
  </div>
<script>
const reviewers=['🧸 Christal','👓 Crystal','✝️ Mero','👟 Vivian'];
const days=[
{tab:'Day 1',theme:'Arrival & Welcome',glance:{walk:'3–4 km',transport:'Airport transfer + short Grab',breakfast:'Phở SOL · $',lunch:'Light bites · $',dinner:'Omakase Tiger · $$$',spa:'Nha Suga Spa'},plan:'第一天只保留必要安排，重點是順利抵達、換錢、入住與調整節奏。晚餐選擇早場，讓大家不需要第一晚已經食到太夜，亦可以為接下來幾日保留體力。',timeline:[['09:30','Airport arrival + transfer'],['10:30','Hotel drop-off / exchange'],['Afternoon','Nha Suga Spa'],['17:30','Omakase Tiger dinner']],activities:[['Airport Transfer','Why this plan','直接由機場到酒店，先處理行李與換匯，避免第一天一早已經分散體力。'],['Nha Suga Spa','Why this plan','長途飛行後先安排 spa，比直接開始行街更合適。第一天用慢節奏開局，大家會更容易進入旅行狀態。'],['Omakase Tiger','Why this plan','第一天以適應旅程節奏為主。5:30 的早場既能欣賞日落，又可提早完成晚餐，讓大家在長途飛行後輕鬆展開旅程。']]},
{tab:'Day 2',theme:'Craft & Discovery',glance:{walk:'4–5 km',transport:'Walk + short Grab',breakfast:'Hotel / café · $',lunch:'Cooking Class · $$',dinner:'LÚNE · $$$',spa:'—'},plan:'這一天以體驗與輕量探索為主。早段安排 cooking class，下午留給市中心店舖與 café，晚餐則保留一個較完整的餐飲體驗，不把節奏排得太碎。',timeline:[['Morning','Saigon Cooking Class'],['Afternoon','Shopping route'],['Evening','LÚNE dinner']],activities:[['Saigon Cooking Class','Why this plan','早上做 cooking class，剛好把市場、食物與文化放在一起，不需要另外安排太多景點。'],['Shopping Route','Why this plan','下午集中在步行距離內的店舖，讓大家可以按體力調整，不想買亦可以 café break。'],['LÚNE','Why this plan','放在 Day 2 是因為這天行程比較集中，晚上可以留給一餐較完整的 shared dinner，不會跟 spa 或長距離交通撞在一起。']]},
{tab:'Day 3',theme:'Neighbourhoods & Flavours',glance:{walk:'3–4 km',transport:'Grab to Thảo Điền',breakfast:'Crab noodles · $',lunch:'Pizza 4P’s · $$',dinner:'Little Bear · $$$',spa:'—'},plan:'第三天把移動重點放在 Thảo Điền，讓大家不用在同一天來回太多區域。早餐與午餐較 casual，晚上留給一間有記憶點的餐廳。',timeline:[['Morning','Crab noodles'],['Midday','Thảo Điền'],['Lunch','Pizza 4P’s'],['Dinner','Little Bear']],activities:[['Crab Noodles','Why this plan','早餐安排地道小店，讓這天由一個簡單、有在地感的開始進入，不需要一早坐低食太久。'],['Thảo Điền','Why this plan','把第二郡集中在同一天處理，減少跨區來回，也方便大家按體力決定逛幾多。'],['Little Bear','Why this plan','晚餐放在這天，是因為白天已在相對輕鬆的 neighbourhood 節奏中，晚上可以自然延伸成一餐有氣氛的 dinner。']]},
{tab:'Day 4',theme:'Culture & Celebration',glance:{walk:'4–6 km',transport:'Grab + walk',breakfast:'Running Beans · $',lunch:'Bếp Mẹ Ỉn · $$',dinner:'Quince · $$$',spa:'—'},plan:'第四天保留較完整的文化與城市路線，早段處理博物館與第三郡，下午再回到市中心。晚餐作為旅程尾聲前的重點安排。',timeline:[['Morning','War Museum / Pink Church'],['Afternoon','District 3 shopping'],['Dinner','Quince']],activities:[['War Remnants Museum','Why this plan','放在早段是為了避開午後疲倦，也讓後面安排較輕的 shopping 與 café，平衡這天的情緒與節奏。'],['District 3 Shopping','Why this plan','這段路線以小店為主，可以逛得深入，也可以隨時縮短，是適合放在文化行程之後的 flexible block。'],['Quince','Why this plan','把 Quince 放在旅程後段，是想留一餐比較成熟、有慶祝感的 dinner，作為四人行的高點之一。']]},
{tab:'Day 5',theme:'A Gentle Farewell',glance:{walk:'2–3 km',transport:'Airport transfer',breakfast:'Phở Việt Nam · $',lunch:'Bếp Mẹ Ỉn · $$',dinner:'Airport / light meal · $',spa:'HA Spa'},plan:'最後一天不再加入太多新區域，只保留容易完成的餐廳與 spa。重點是收尾、整理、放慢，而不是在出發前再追景點。',timeline:[['Morning','Phở Việt Nam'],['Lunch','Bếp Mẹ Ỉn'],['Afternoon','HA Spa'],['Evening','Airport']],activities:[['Phở Việt Nam','Why this plan','最後一天用一碗 pho 作為簡單開始，不需要複雜安排，也保留一點越南味道作結。'],['Bếp Mẹ Ỉn','Why this plan','午餐選擇家常越菜，是為了用比較完整但不過份正式的一餐，作為旅程收尾。'],['HA Spa','Why this plan','航班前安排 spa，可以把最後半天變得更從容，也避免拖著行李到處逛。']]}
];
function reaction(){return `<div class="react"><button>👍 Keep</button><button>👌 Happy</button><button>🤔 Discuss</button><button>👎 Replace</button></div><textarea placeholder="Optional comment / 有需要先寫低想法…"></textarea>`}
function dayHTML(d,i){return `<section class="section" id="day${i}"><div class="day-head"><div><div class="day-kicker">DAY ${i+1}</div><h2 class="day-title">${d.theme}</h2></div></div><div class="card"><h3>Plan at a Glance</h3><div class="glance">${[['🚶 Walk',d.glance.walk],['🚕 Transport',d.glance.transport],['☕ Breakfast',d.glance.breakfast],['🍜 Lunch',d.glance.lunch],['🍷 Dinner',d.glance.dinner],['🧖 Spa',d.glance.spa]].map(x=>`<div class="glance-item"><div class="label">${x[0]}</div><div class="value">${x[1]}</div></div>`).join('')}</div></div><div class="two"><div class="card"><h3>Today’s Plan</h3><p>${d.plan}</p></div><div class="card"><h3>Timeline</h3><div class="timeline">${d.timeline.map(t=>`<div class="time-row"><div class="time">${t[0]}</div><div>${t[1]}</div></div>`).join('')}</div></div></div><div class="card"><h3>Activities</h3>${d.activities.map(a=>`<div class="activity"><h4>${a[0]}</h4><div class="why"><strong>${a[1]}</strong><br>${a[2]}</div>${reaction()}</div>`).join('')}</div><div class="card"><h3>Around the Table</h3><div class="table">${reviewers.map(r=>`<div class="person"><strong>${r}</strong><span class="muted">Quick thoughts, concerns or changes.</span></div>`).join('')}</div></div></section>`}
const nav=document.getElementById('nav'),app=document.getElementById('app');
nav.innerHTML=['Journey',...days.map(d=>d.tab),'Final Review'].map((n,i)=>`<button data-i="${i}" class="${i===0?'active':''}">${n}</button>`).join('');
app.innerHTML=`<section class="section active" id="home"><div class="card"><h3>Planning Book</h3><p>這裡不是 travel guide，而是四位媽媽出發前一起完成 final itinerary 的地方。先用 👍 👌 🤔 👎 快速表態；有需要才補充 comment。</p></div><div class="grid">${reviewers.map(r=>`<div class="card"><h3>${r}</h3><p class="muted">Review status will appear here in the collaboration build.</p></div>`).join('')}</div></section>`+days.map(dayHTML).join('')+`<section class="section" id="final"><div class="day-head"><div><div class="day-kicker">FINAL</div><h2 class="day-title">Final Review</h2></div></div><div class="card"><h3>Trip Summary</h3><p>下一階段加入同步後，這裡會集中顯示每日反應、comments、未決定事項，以及每位 reviewer 的完成進度。</p></div><div class="table">${reviewers.map(r=>`<div class="person"><strong>${r}</strong><span class="muted">Pending review.</span></div>`).join('')}</div></section>`;
function show(i){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));document.querySelector(`.nav button[data-i="${i}"]`).classList.add('active');document.querySelector(i===0?'#home':i===6?'#final':`#day${i-1}`).classList.add('active');scrollTo({top:0,behavior:'smooth'});} nav.onclick=e=>{if(e.target.dataset.i)show(+e.target.dataset.i)};
</script>
</body>
</html>
