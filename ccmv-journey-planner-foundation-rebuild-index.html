<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CCMV Journey Planner｜Foundation Rebuild</title>
  <style>
    :root{
      --cream:#fbf4e8; --paper:#fffdf8; --ink:#2c2419; --muted:#7b6c58;
      --line:#e9dcc7; --gold:#b28a3a; --gold-deep:#8b641e; --soft:#f4ead8;
      --rose:#bd786d; --green:#74845e; --shadow:0 18px 48px rgba(66,43,16,.10);
      --radius:26px;
    }
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Avenir Next","Inter","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;background:radial-gradient(circle at 78% 8%,rgba(178,138,58,.18),transparent 26%),linear-gradient(135deg,#fffaf1 0%,#fbf4e8 52%,#f5ead8 100%);min-height:100vh}
    body:before{content:"CCMV";position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);font-family:Georgia,serif;font-size:min(22vw,290px);letter-spacing:.08em;color:rgba(139,100,30,.17);z-index:-1;white-space:nowrap;pointer-events:none}
    .shell{display:grid;grid-template-columns:300px minmax(0,1fr);min-height:100vh}.side{position:sticky;top:0;height:100vh;padding:34px 26px;border-right:1px solid var(--line);background:rgba(255,250,242,.78);backdrop-filter:blur(18px);overflow:auto}.brand{text-align:center}.mark{width:104px;height:104px;border-radius:50%;margin:0 auto 16px;display:grid;place-items:center;border:1px solid rgba(178,138,58,.45);background:linear-gradient(135deg,#fffaf1,#f1dfbe);box-shadow:0 14px 28px rgba(66,43,16,.12);font-family:Georgia,serif;font-size:27px;color:var(--gold-deep);letter-spacing:.08em}.brand h1{font-family:Georgia,serif;font-weight:500;font-size:34px;line-height:1.05;margin:0}.brand p{margin:10px 0 0;color:var(--muted);font-size:13px;letter-spacing:.12em;text-transform:uppercase}.reviewer{margin-top:28px;padding:18px;border:1px solid var(--line);border-radius:22px;background:rgba(255,253,248,.76)}label{display:block;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-deep);font-weight:800;margin-bottom:8px}select,input,textarea{font:inherit}select{width:100%;border:1px solid var(--line);border-radius:999px;background:#fffaf1;padding:11px 13px;color:var(--ink)}.nav{display:grid;gap:9px;margin-top:24px}.nav button{border:1px solid transparent;background:transparent;text-align:left;border-radius:17px;padding:13px 14px;color:#594b39;font-weight:750;cursor:pointer}.nav button small{display:block;color:var(--muted);font-weight:500;margin-top:3px}.nav button.active{border-color:rgba(178,138,58,.34);background:#fffaf1;color:#5e4010;box-shadow:0 8px 20px rgba(66,43,16,.07)}.main{padding:44px min(5vw,72px) 80px}.topline{display:flex;justify-content:space-between;gap:18px;align-items:center;margin-bottom:24px}.badge{display:inline-flex;border:1px solid rgba(178,138,58,.32);background:rgba(255,253,248,.72);border-radius:999px;padding:9px 13px;font-size:12px;color:#654914;font-weight:800;letter-spacing:.08em;text-transform:uppercase}.ghost{border:1px solid var(--line);background:#fffaf1;border-radius:999px;padding:10px 14px;font-weight:800;color:#6b4b12;cursor:pointer}.hero{position:relative;overflow:hidden;background:rgba(255,253,248,.86);border:1px solid var(--line);border-radius:32px;padding:34px;box-shadow:var(--shadow)}.card{position:relative;overflow:hidden;background:rgba(255,253,248,.90);border:1px solid var(--line);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}.hero:after,.card:after{content:"CCMV";position:absolute;right:18px;bottom:-10px;font-family:Georgia,serif;font-size:68px;letter-spacing:.08em;color:rgba(139,100,30,.10);pointer-events:none}.hero:after{font-size:110px;color:rgba(139,100,30,.13)}h2,h3,p{margin-top:0}h2{font-family:Georgia,serif;font-weight:500;font-size:54px;line-height:1;margin-bottom:8px}h3{font-family:Georgia,serif;font-weight:500;font-size:31px;margin-bottom:12px}.chapter{font-size:22px;color:var(--gold-deep);font-weight:750;margin:0}.copy{color:#504638;line-height:1.85;font-size:16px;max-width:820px}.grid{display:grid;gap:18px}.grid.two{grid-template-columns:1.05fr .95fr}.days-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-top:24px}.day-link{cursor:pointer;text-align:left}.day-link h4{font-family:Georgia,serif;font-size:24px;margin:0 0 6px}.day-link p{margin:0;color:var(--muted);line-height:1.55}.section{margin-top:24px}.section-title{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-deep);font-weight:900;margin:0 0 13px}.glance{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}.glance-item{border:1px solid #eadfcf;background:#fffaf1;border-radius:18px;padding:14px 12px;min-height:86px}.glance-item span{display:block;font-size:12px;color:var(--muted);font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}.glance-item strong{font-size:17px;line-height:1.25}.plan{border-left:3px solid var(--gold);padding-left:18px;color:#493f33;line-height:1.9}.timeline{display:grid;gap:16px}.activity{display:grid;grid-template-columns:112px minmax(0,1fr);gap:18px}.time{padding-top:18px;text-align:center;color:var(--gold-deep);font-weight:900}.time small{display:block;color:var(--muted);font-weight:600;margin-top:5px}.activity h4{font-size:25px;margin:0 0 8px}.meta{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.pill{border:1px solid rgba(178,138,58,.28);background:#fff8eb;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800;color:#674915}.why{margin:14px 0;padding:14px 15px;border-radius:17px;background:rgba(244,234,216,.68);border:1px solid rgba(178,138,58,.18);line-height:1.75;color:#4b4135}.why b{color:#7a5716}.reactions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.react{border:1px solid var(--line);background:#fffaf1;border-radius:999px;padding:10px 13px;font-weight:850;cursor:pointer}.react.active{background:linear-gradient(135deg,#4b3310,#b28a3a);border-color:transparent;color:white}.comment{margin-top:12px;display:none}.comment.open{display:block}.comment textarea{width:100%;min-height:78px;border:1px solid var(--line);border-radius:18px;background:#fffaf1;padding:12px;resize:vertical}.table-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.seat{min-height:150px}.seat h4{margin:0 0 10px;font-size:20px}.seat textarea{width:100%;min-height:72px;border:1px solid var(--line);border-radius:18px;background:#fffaf1;padding:12px;resize:vertical}.summary-box{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}.mini{border:1px solid var(--line);background:#fffaf1;border-radius:16px;padding:12px}.mini strong{display:block;font-size:22px}.mini span{color:var(--muted);font-size:12px}.final-list{display:grid;gap:12px}.actions{display:flex;justify-content:space-between;gap:12px;margin-top:24px}.hide{display:none!important}
    @media(max-width:1050px){.shell{grid-template-columns:1fr}.side{position:relative;height:auto;padding:16px;border-right:0;border-bottom:1px solid var(--line)}.brand{display:flex;align-items:center;gap:12px;text-align:left}.mark{width:56px;height:56px;font-size:16px;margin:0}.brand h1{font-size:23px}.brand p{display:none}.reviewer{margin-top:12px;padding:12px}.nav{display:flex;overflow:auto;margin:12px -16px 0;padding:0 16px 8px}.nav button{white-space:nowrap;min-width:120px;text-align:center}.nav button small{display:none}.main{padding:22px 16px 60px}.topline{display:block}.ghost{margin-top:10px}.hero{padding:24px}h2{font-size:42px}.days-grid,.grid.two{grid-template-columns:1fr}.glance{grid-template-columns:repeat(2,1fr)}.activity{grid-template-columns:1fr}.time{text-align:left;padding:0}.table-grid,.summary-box{grid-template-columns:1fr}.hero:after{font-size:72px}.card:after{font-size:54px}.react{padding:12px 14px}.comment{display:block}}
  </style>
</head>
<body>
<div class="shell">
  <aside class="side">
    <div class="brand"><div class="mark">CCMV</div><div><h1>Journey<br>Planner</h1><p>Vietnam 2026</p></div></div>
    <div class="reviewer"><label>Reviewer</label><select id="reviewer"><option value="Christal">🧸 Christal</option><option value="Crystal">👓 Crystal</option><option value="Mero">✝️ Mero</option><option value="Vivian">👟 Vivian</option></select></div>
    <nav class="nav" id="nav"></nav>
  </aside>
  <main class="main">
    <div class="topline"><span class="badge">Foundation Rebuild · Before the Trip</span><button class="ghost" id="exportBtn">Copy Review Summary</button></div>
    <section id="app"></section>
  </main>
</div>
<script>
const days=[
{id:'d1',label:'Day 1',date:'30 Oct',title:'Arrival & Welcome',glance:{walk:'3–4 km',transport:'Airport transfer + short Grab',breakfast:'Flight / light snack',lunch:'Phở SOL · $',dinner:'Omakase Tiger · $$$',spa:'Nha Suga'},plan:'第一天以適應旅程節奏為主。行程集中在第一郡，先處理現金、行李與第一餐，再把下午交給室內咖啡與 Spa。晚餐安排 5:30 早場，讓大家在長途飛行後可以輕鬆展開旅程，而不是第一晚已經食到太夜。',activities:[
['09:30','30 mins','機場 ATM 取款','先處理現金，減少之後幾日臨時找換的麻煩；如 ATM 不順利，Ha Tam 可作後備。','Money / Arrival','👍 Keep','👌 OK','🤔 Discuss','👎 Skip'],
['10:00','45 mins','Fusion Original 寄放行李','酒店位置方便，先寄放行李再輕裝出發，讓第一天不用急著等 check-in。','Hotel / Reset','👍 Keep','👌 OK','🤔 Discuss','👎 Skip'],
['11:15','60 mins','Phở SOL','下機後第一餐安排在酒店附近，距離短、壓力低，用一碗熱河粉慢慢進入西貢節奏。','Lunch · $','👍 Love','👌 OK','🤔 Discuss','👎 Replace'],
['12:30','90 mins','中央郵局・紅教堂・書街','三個地點距離近，適合以輕鬆方式完成第一天經典路線；太熱或太累亦可縮短。','Landmark / Photo','👍 Keep','👌 OK','🤔 Discuss','👎 Skip'],
['14:00','2–3 hrs','The Cafe Apartments + Nha Suga Spa','下午安排室內與 Spa，是為了避開最熱時段，同時讓大家在長途飛行後有時間整理狀態。','Spa / Café','👍 Love','👌 OK','🤔 Discuss','👎 Replace'],
['17:30','2 hrs','Omakase Tiger','5:30 早場很適合 arrival day：可以看日落，又能早點完成晚餐，讓大家不用第一晚已經食到太夜。','Dinner · $$$','👍 Love','👌 OK','🤔 Discuss','👎 Replace'],
['19:45','Optional','阮惠步行街・Cafe Apartments 夜景','這段保留為 optional，是給有精神的人順路看夜景；如果大家累了，可以直接回酒店。','Optional','👍 Keep','👌 OK','🤔 Discuss','👎 Skip']]
},
{id:'d2',label:'Day 2',date:'31 Oct',title:'Cooking & Shopping',glance:{walk:'1.5 km+',transport:'Short Grab + walkable shopping route',breakfast:'Cơm Tấm Mộc · $',lunch:'Saigon Cooking Class · $$',dinner:'LÚNE · $$$',spa:'Mộc Kim'},plan:'第二天以 cooking class 作為主軸，早上先以地道早餐開始，再自然接到午餐體驗。下午安排 Spa 作為轉場，之後才進入第一郡購物線，讓節奏由 hands-on local experience 慢慢轉入更精緻的 evening setting。',activities:[
['08:30','60 mins','Cơm Tấm Mộc','早餐安排在酒店附近，先試一個地道但不太折騰的選項，之後再去 cooking class。','Breakfast · $','👍 Love','👌 OK','🤔 Discuss','👎 Replace'],
['10:00','3 hrs','Saigon Cooking Class','這是 Day 2 的核心體驗，完成後已包含午餐，避免再另外安排一餐令時間太趕。','Core / Lunch','👍 Must keep','👌 OK','🤔 Discuss','👎 Replace'],
['13:15','2 hrs','Mộc Kim Spa & Beauty','Cooking class 後正值炎熱時段，先用 Spa 降低疲勞感，再開始下午購物會比較舒服。','Spa','👍 Love','👌 OK','🤔 Discuss','👎 Replace'],
['15:30','3–4 hrs','第一郡購物動線','購物店舖集中在同一條線，方便大家按體力與興趣取捨，不需要每間都完成。','Shopping','👍 Keep','👌 OK','🤔 Discuss','👎 Too much'],
['19:00','2 hrs','LÚNE Restaurant & Bar','晚餐放在購物後，是因為位置方便、收結感較強，亦回應想安排一晚較 refined dinner 的期待。','Dinner · $$$','👍 Love','👌 OK','🤔 Discuss','👎 Replace']]
},
{id:'d3',label:'Day 3',date:'1 Nov',title:'Thảo Điền Lifestyle',glance:{walk:'District 1 + Thảo Điền stroll',transport:'Grab to Thảo Điền',breakfast:'Quán Thuý 94 · $',lunch:'Bakes / Café · $$',dinner:'Little Bear · $$$',spa:'Mộc Hương'},plan:'第三天把節奏移到 Thảo Điền，目的不是趕景點，而是留時間給街區、生活小店與 café break。Spa 和晚餐都安排在同區，避免來回折返，讓這天成為整趟旅程中比較慢、比較有呼吸感的一日。',activities:[
['09:00','60 mins','Quán Thuý 94','先在第一郡完成蟹粉早餐，再出發去 Thảo Điền，避免到草田後還要再找地道早餐。','Breakfast · $','👍 Love','👌 OK','🤔 Discuss','👎 Replace'],
['10:00','45 mins','粉紅教堂 + Cộng Cà Phê','這段安排短停即可，主要是順路拍照與喝咖啡，不會把上午變成太重的 sightseeing。','Photo / Coffee','👍 Keep','👌 OK','🤔 Discuss','👎 Skip'],
['11:45','3 hrs','Thảo Điền 街區漫步','把時間留給 lifestyle shops，是因為這區適合慢慢逛，不適合用趕場方式完成。','Lifestyle','👍 Love','👌 OK','🤔 Discuss','👎 Too much'],
['13:30','60 mins','Bakes / The Dreamers Bakery','午餐不安排太重，是為了保留晚上 Little Bear 的胃口，同時給大家中途坐低休息。','Light lunch · $$','👍 Keep','👌 OK','🤔 Discuss','👎 Replace'],
['15:45','2 hrs','Mộc Hương Wellness Thảo Điền','Spa 放在晚餐前，是為了把白天逛街後的疲勞先放低，之後不用回酒店再折返。','Spa','👍 Love','👌 OK','🤔 Discuss','👎 Replace'],
['19:00','2 hrs','Little Bear','安排在 Thảo Điền 這天，是因為晚餐與白天路線在同區，動線自然，也和前兩晚餐飲風格不同。','Dinner · $$$','👍 Love','👌 OK','🤔 Discuss','👎 Replace']]
},
{id:'d4',label:'Day 4',date:'2 Nov',title:'Culture & Finale',glance:{walk:'Museum + Phú Nhuận shopping',transport:'Grab between districts',breakfast:'The Running Bean · $$',lunch:"Pizza 4P's · $$",dinner:'Quince Saigon · $$$',spa:'Temple Leaf'},plan:'第四天是最後一個完整日，所以安排得較有層次：早上留給歷史與城市感，午後完成最後 shopping，傍晚用足底按摩讓雙腳休息，再以 Quince 作為 farewell dinner。Rooftop 只保留為 optional，不把最後一晚排得太滿。',activities:[
['08:30','60 mins','The Running Bean','早上由酒店附近咖啡開始，讓 Day 4 不會一早太急，亦方便大家按狀態調整出發時間。','Breakfast · $$','👍 Keep','👌 OK','🤔 Discuss','👎 Replace'],
['09:30','2 hrs','戰爭遺蹟博物館','博物館內容較沉重，所以放在上午，之後用較輕的午餐與 shopping 平衡情緒與節奏。','Culture','👍 Keep','👌 OK','🤔 Discuss','👎 Skip'],
['11:30','90 mins',"Pizza 4P's Hai Bà Trưng",'午餐選 Pizza 4P’s，是為了在越南菜之間加入一餐較輕鬆、大家都容易接受的選項。','Lunch · $$','👍 Love','👌 OK','🤔 Discuss','👎 Replace'],
['13:30','3 hrs','Phú Nhuận 購物動線','這是最後一段 shopping time，安排在 Day 4 而不是 Day 5，是為了避免離境日還要趕。','Shopping','👍 Keep','👌 OK','🤔 Discuss','👎 Too much'],
['17:30','105 mins','Temple Leaf Spa Land','Shopping 後安排足底按摩，主要是讓大家在 farewell dinner 前恢復體力，不用帶著疲累入夜。','Spa','👍 Love','👌 OK','🤔 Discuss','👎 Replace'],
['20:15','2 hrs','Quince Saigon','Quince 放在最後一個完整晚上，是因為它有 farewell dinner 的份量，適合作為這趟旅程的正式收結。','Dinner · $$$','👍 Love','👌 OK','🤔 Discuss','👎 Replace'],
['22:15','Optional','Social Club Rooftop Bar','Rooftop 只作 optional，滿足想看夜景的期待，但不要求每個人一定要參與。','Optional','👍 Keep','👌 OK','🤔 Discuss','👎 Skip']]
},
{id:'d5',label:'Day 5',date:'3 Nov',title:'A Gentle Farewell',glance:{walk:'Hotel area only',transport:'Transfer to airport area',breakfast:'Phở Việt Nam · $',lunch:'Bếp Mẹ Ỉn · $$',dinner:'Airport / light · $',spa:'HA Spa'},plan:'最後一天以時間控制為主。早餐、午餐與手信都安排在酒店周邊，方便隨時收拾與調整；下午提早轉到機場區 HA Spa，避開傍晚交通，把離境前的壓力降到最低。',activities:[
['09:30','60 mins','Phở Việt Nam Bến Thành','最後一天早餐安排在酒店附近，讓大家再食一次河粉，但不需要走遠或趕時間。','Breakfast · $','👍 Love','👌 OK','🤔 Discuss','👎 Replace'],
['10:30','75 mins','胡志明市美術館','美術館距離近、節奏慢，適合作為離境日的輕量活動，不會消耗太多體力。','Photo / Museum','👍 Keep','👌 OK','🤔 Discuss','👎 Skip'],
['11:45','75 mins','Bếp Mẹ Ỉn','午餐放在酒店區附近，是為了保留彈性；食完可直接回去收拾或補買手信。','Lunch · $$','👍 Love','👌 OK','🤔 Discuss','👎 Replace'],
['13:00','75 mins','Takashimaya + Maison Marou','最後補貨安排在酒店樓下附近，方便控制時間，也避免離境日前再跨區移動。','Souvenirs','👍 Keep','👌 OK','🤔 Discuss','👎 Skip'],
['14:45','45 mins','提行李前往 HA Spa','提早離開第一郡，是為了避開傍晚塞車，把不確定性留在 Spa 前，而不是去機場前。','Transport','👍 Keep','👌 OK','🤔 Discuss','👎 Too early'],
['15:30','2 hrs','HA Spa','HA Spa 靠近機場，適合把最後放鬆和離境動線接在一起，完成後不用再穿過市區。','Spa','👍 Love','👌 OK','🤔 Discuss','👎 Replace'],
['18:00','3 hrs','新山一機場','提早到機場是為了保留 check-in、晚餐與休息時間，讓旅程以穩定而不是趕急作結。','Airport','👍 Keep','👌 OK','🤔 Discuss','👎 Too early']]
}];
const reviewers=['🧸 Christal','👓 Crystal','✝️ Mero','👟 Vivian'];
let current=localStorage.getItem('ccmv-current')||'home';
const nav=document.getElementById('nav'),app=document.getElementById('app'),reviewer=document.getElementById('reviewer');
reviewer.value=localStorage.getItem('ccmv-reviewer')||'Crystal';reviewer.onchange=()=>localStorage.setItem('ccmv-reviewer',reviewer.value);
function key(id,i,type){return `ccmv-${id}-${i}-${reviewer.value}-${type}`}
function navRender(){nav.innerHTML=`<button data-id="home"><b>Journey</b><small>Planning Book</small></button>`+days.map(d=>`<button data-id="${d.id}"><b>${d.label}</b><small>${d.title}</small></button>`).join('')+`<button data-id="final"><b>Final Review</b><small>Summary</small></button>`;nav.querySelectorAll('button').forEach(b=>{b.classList.toggle('active',b.dataset.id===current);b.onclick=()=>{current=b.dataset.id;localStorage.setItem('ccmv-current',current);render()}})}
function home(){return `<div class="hero"><h2>CCMV Journey Planner</h2><p class="chapter">Vietnam 2026</p><p class="copy">這裡不是 Travel Guide，而是出發前一起完成行程決定的 planning book。每一日都可以快速表態、補充意見，再把討論收斂成 Final Review。</p><div class="days-grid">${days.map(d=>`<button class="card day-link" onclick="current='${d.id}';localStorage.setItem('ccmv-current',current);render()"><h4>${d.label}</h4><p>${d.title}<br>${d.date}</p></button>`).join('')}</div></div><div class="section grid two"><div class="card"><p class="section-title">How to Review</p><p class="copy">先用 👍 👌 🤔 👎 快速表態。有需要先留言。重點不是寫長文，而是讓大家知道哪些安排可以 keep，哪些需要 discuss 或 replace。</p></div><div class="card"><p class="section-title">Around the Table</p><p class="copy">每日最後保留四位媽媽的位置。之後接 Supabase 後，這裡會變成大家都看得到的 comment summary。</p></div></div>`}
function dayPage(d,idx){return `<div class="hero"><h2>${d.label}</h2><p class="chapter">${d.title}</p></div><section class="section card"><p class="section-title">Plan at a Glance</p><div class="glance">${Object.entries({walk:d.glance.walk,transport:d.glance.transport,breakfast:d.glance.breakfast,lunch:d.glance.lunch,dinner:d.glance.dinner,spa:d.glance.spa}).map(([k,v])=>`<div class="glance-item"><span>${emoji(k)} ${cap(k)}</span><strong>${v}</strong></div>`).join('')}</div></section><section class="section card"><p class="section-title">Why this plan</p><p class="plan">${d.plan}</p></section><section class="section"><p class="section-title">Timeline + Activities</p><div class="timeline">${d.activities.map((a,i)=>act(d,a,i)).join('')}</div></section><section class="section card"><p class="section-title">Around the Table</p><div class="table-grid">${reviewers.map(r=>`<div class="seat"><h4>${r}</h4><textarea placeholder="${r.split(' ')[1]} 的整體想法..."></textarea></div>`).join('')}</div><div class="summary-box"><div class="mini"><strong id="sum-${d.id}-love">0</strong><span>Positive</span></div><div class="mini"><strong id="sum-${d.id}-discuss">0</strong><span>Discuss</span></div><div class="mini"><strong id="sum-${d.id}-replace">0</strong><span>Replace / Skip</span></div><div class="mini"><strong>${d.activities.length}</strong><span>Activities</span></div></div></section><div class="actions"><button class="ghost" onclick="go(${idx-1})">← Previous</button><button class="ghost" onclick="go(${idx+1})">Next →</button></div>`}
function emoji(k){return {walk:'🚶',transport:'🚕',breakfast:'☕',lunch:'🍜',dinner:'🍷',spa:'🧖'}[k]} function cap(k){return k.charAt(0).toUpperCase()+k.slice(1)}
function act(d,a,i){let [time,dur,title,why,tag,...opts]=a; return `<div class="activity"><div class="time">${time}<small>${dur}</small></div><div class="card"><h4>${title}</h4><div class="meta"><span class="pill">${tag}</span></div><div class="why"><b>Why this plan</b><br>${why}</div><div class="reactions">${opts.map((o,j)=>`<button class="react" onclick="react('${d.id}',${i},${j},this)">${o}</button>`).join('')}<button class="react" onclick="this.closest('.card').querySelector('.comment').classList.toggle('open')">💬 Comment</button></div><div class="comment"><textarea placeholder="Optional comment — 有需要先寫。"></textarea></div></div></div>`}
function final(){return `<div class="hero"><h2>Final Review</h2><p class="chapter">Around the Table</p><p class="copy">這一頁暫時是 frontend proof。之後加入 Supabase 後，會自動顯示四位媽媽的完成進度、每一日的反應分佈，以及所有 comments summary。</p></div><div class="section grid two"><div class="card"><p class="section-title">Decision Summary</p><p class="copy">目標：快速看見哪些活動大家都同意，哪些需要調整，哪些可以刪走。</p></div><div class="card"><p class="section-title">Reviewer Progress</p><p class="copy">下一階段會顯示：Christal 已完成 3/5 days，Mero 未開始。這部分需要 database 才能讓四個人同步。</p></div></div>`}
function react(id,i,j,btn){let group=btn.parentElement.querySelectorAll('.react');group.forEach(x=>x.classList.remove('active'));btn.classList.add('active');localStorage.setItem(key(id,i,'reaction'),j);updateSums(id)}
function updateSums(id){let love=0,disc=0,rep=0;let d=days.find(x=>x.id===id);if(!d)return;d.activities.forEach((a,i)=>{let v=localStorage.getItem(key(id,i,'reaction')); if(v==='0'||v==='1')love++; if(v==='2')disc++; if(v==='3')rep++;});['love','discuss','replace'].forEach((n,ix)=>{let el=document.getElementById(`sum-${id}-${n}`); if(el)el.textContent=[love,disc,rep][ix]})}
function go(i){if(i<0)current='home';else if(i>=days.length)current='final';else current=days[i].id;localStorage.setItem('ccmv-current',current);render()}
function render(){navRender(); if(current==='home')app.innerHTML=home(); else if(current==='final')app.innerHTML=final(); else {let idx=days.findIndex(d=>d.id===current); app.innerHTML=dayPage(days[idx],idx); updateSums(current)} window.scrollTo({top:0,behavior:'smooth'})}
document.getElementById('exportBtn').onclick=()=>{let txt=`CCMV Journey Planner Review Summary\nReviewer: ${reviewer.value}\n\n`;days.forEach(d=>{txt+=`${d.label} — ${d.title}\n`;d.activities.forEach((a,i)=>{let r=localStorage.getItem(key(d.id,i,'reaction')); if(r!==null)txt+=`- ${a[2]}: ${a[5+Number(r)]}\n`;});txt+='\n'});navigator.clipboard?.writeText(txt);alert('Summary copied.');};
render();
</script>
</body></html>
